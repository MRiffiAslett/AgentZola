[sut]
name = "xla"
framework = "tensorflow"

[paths]
prompt_dir = "prompts"
output_dir = "generated-outputs"
hf_home = "hf_cache"
log_file = "whitefox-llm-gen.log"
bandit_state_file = "whitefox_state.json"



[model]
name = "bigcode/starcoder"
dtype = "float16"
max_model_len = 8192
gpu_memory_utilization = 0.85
swap_space = 4

[generation]
num_samples = 1     
# KV-cache sizing: with n=10 samples and max_model_len=8192 the worst-case call
# (long feedback prompt ~1400 tokens + 10 samples × output tokens) needs
# 1400/16 + (output/16)×10 KV blocks.  With gpu_memory_utilization=0.85 the
# pre-allocated pool is (0.85×80-30) GB ÷ 15 MB/block ≈ 2530 blocks.
#   max_tokens=4096 → worst case 1400/16 + 4096/16×10 = 87+2560 = 2647 blocks > 2530 → OVERFLOW
#   max_tokens=2048 → worst case 1400/16 + 2048/16×10 = 87+1280 = 1367 blocks < 2530 → safe
# KV overflow forces vLLM to emit an emergency cudaMalloc which maps new GPU
# pages into CPU address space, triggering the sudden +130 GB CPU RSS spike
# observed in job 250154 batch0/batch2 at ts≈1781653982 after 23 h of stability.
# Generated test functions rarely exceed 1000 tokens in practice; 2048 is 2×.
max_tokens = 2048
temperature = 1.0    
top_p = 1.0        
split_size = 20      
unit_num = 2       
optimizations_dir = "xilo_xla/artifacts/generation-prompts-20250806"
# Paper (OOPSLA'24 §5.2): 1000 tests per optimization = 100 iterations × 10 tests/iteration; 3-shot feedback.
tests_per_optimization = 1000
tests_per_iteration = 10
max_iterations = 100
examples_per_prompt = 3
test_timeout = 30
# ProcessPool max_workers for TF/XLA tests.
# Cap below --cpus-per-task on Slurm: each worker can spawn several TF/XLA children; matching
# CPUs to workers often OOMs (vLLM + N workers + llvm-profdata) even at 48G RSS limit.
parallel_test_workers = 4
# Keep 1 on a single GPU: vLLM is shared under a lock; higher values mostly add contention without throughput wins.
parallel_optimizations = 1
optimizations = [
    "AllGatherBroadcastReorder",
    "AllGatherCombiner",
    "AllGatherDecomposer",
    "AllReduceFolder",
    "AllReduceSimplifier",
    "BatchDotSimplification",
    "Bfloat16ConversionFolding",
    "BroadcastCanonicalizer",
    "ChangeOpDataType",
    "CollectivesScheduleLinearizer",
    "ConvertMover",
    "Defuser",
    "DotDecomposer",
    "DotMerger",
    "HloConstantFolding",
    "HloCse",
    "HloDce",
    "HloElementTypeConverter",
    "LoopScheduleLinearizer",
    "MapInliner",
    "ReduceScatterCombiner",
    "ReduceScatterDecomposer",
    "ShardingRemover",
    "SimplifyFpConversions",
    "SliceSinker",
    "StochasticConvertDecomposer",
    "TopkRewriter",
    "TransposeFolding",
    "TreeReductionRewriter",
    "TupleSimplifier",
    "WhileLoopConstantSinking",
    "WhileLoopExpensiveInvariantCodeMotion",
    "WhileLoopTripCountAnnotator",
    "ZeroSizedHloElimination",
]

[prompts]
prompt_style = "stacked"  # "paper" (Fig. 4) or "stacked" (seed Q/A prefix). Budget matches paper §5.2 regardless.
seed_file = "xilo_xla/artifacts/seed_qa.txt"  # path to seed Q+A file, only used when prompt_style = "stacked"
instruction_header = "### Please generate valid TensorFlow model examples that satisfy the requirements below.\nYou should only use public TensorFlow APIs. Each model can be used as input to trigger the optimization pass `{opt_name}` in TensorFlow XLA.\n\n# Description"
feedback_instruction = "### Please generate different valid TensorFlow model examples that satisfy the requirements below.\nYou should only use public TensorFlow APIs. Each model can be used as input to trigger the optimization pass `{opt_name}` in TensorFlow XLA.\n\n# Description"

[stopping]
eof_strings = [
    "<|endoftext|>",
    "###",
    "__output__ =",
    "if __name__",
    '"""',
    "'''",
    "# Model ends",
    "# LLVM IR ends",
    "# C++ Code ends",
]

[oracles]
float_rtol = 1e-5
float_atol = 1e-8

allowed_errors = [
    "tf.function only supports singleton tf.Variables created on the first call",
    "Using a symbolic `tf.Tensor` as a Python `bool` is not allowed",
    "len is not well defined for a symbolic Tensor",
    "To allow the shape to vary across iterations, use the `shape_invariants` argument of tf.while_loop to specify a less-specific shape.",
    "Python functions must return zero or more Tensors or ExtensionTypes or None values",
    "out of scope and cannot be used here",
    "This error may indicate that you're trying to pass a Tensor to a NumPy call, which is not supported.",
    "'SymbolicTensor' object has no attribute",
    "Iterating over a symbolic `tf.Tensor` is not allowed",
    "We failed to lift variable creations out of this tf.functio",
    "Attempting to capture an EagerTensor without building a function",
]

[pass_name_aliases]
AllGatherBroadcastReorder = ["all-gather-bcast-reorder"]
AllGatherCombiner = ["all-gather-combiner", "gpu-all-gather-combiner"]
